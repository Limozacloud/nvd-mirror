name: NVD delta sync

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write
  packages: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download feeds
        run: |
          mkdir -p _tmp
          curl -fsSL https://nvd.nist.gov/feeds/json/cve/2.0/nvdcve-2.0-modified.json.gz -o _tmp/modified.json.gz
          curl -fsSL https://nvd.nist.gov/feeds/json/cve/2.0/nvdcve-2.0-recent.json.gz   -o _tmp/recent.json.gz

      - name: Run sync
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            ghcr.io/limozacloud/nvd-sync:latest \
            update.py --feeds /repo/_tmp/modified.json.gz /repo/_tmp/recent.json.gz \
                      --data /repo/data --state /repo/_state.csv

      - name: Commit changes
        run: |
          git config user.name  "nvd-sync[bot]"
          git config user.email "nvd-sync@users.noreply.github.com"
          git add data/ _state.csv
          git diff --cached --quiet && echo "No changes" && exit 0
          COUNT=$(git diff --cached --name-only | wc -l)
          git commit -m "sync: update ${COUNT} CVEs ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
          git push
